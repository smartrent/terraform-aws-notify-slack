name: Terraform Check CI

on:
  push:
    branches:
      - master
      - hotfix/[0-9]+.[0-9]+.[0-9]+
      - release/[0-9]+.[0-9]+.[0-9]+
  pull_request:
    paths:
      - '**.tf'
      - .tflint.hcl
      - mise.toml
      - mise.lock
      - .github/workflows/terraform_check.yaml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  env_mise:
    runs-on: ubuntu-latest
    outputs:
      terraform_version: ${{ steps.versions.outputs.terraform_version }}
      tflint_version: ${{ steps.versions.outputs.tflint_version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          sparse-checkout: |
            mise.toml
            mise.lock
          sparse-checkout-cone-mode: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - id: versions
        run: |
          echo "terraform_version=$(mise current terraform)" >> "$GITHUB_OUTPUT"
          echo "tflint_version=$(mise current tflint)" >> "$GITHUB_OUTPUT"

  terraform_format:
    needs: env_mise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ needs.env_mise.outputs.terraform_version }}
      - name: terraform fmt
        run: terraform fmt -check -recursive

  terraform_validate:
    needs: env_mise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ needs.env_mise.outputs.terraform_version }}
      - name: terraform init
        run: terraform -chdir="./" init -input=false -backend=false
      - name: terraform validate
        run: terraform -chdir="./" validate

  terraform_tflint:
    needs: env_mise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ needs.env_mise.outputs.terraform_version }}
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
        with:
          tflint_version: v${{ needs.env_mise.outputs.tflint_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: terraform init
        run: terraform -chdir="./" init -input=false -backend=false
      - name: tflint init
        run: tflint --init
      - name: tflint
        run: |
          tflint \
            --minimum-failure-severity=notice \
            --call-module-type=local \
            --format compact \
            --chdir "./" \
            --config "$(pwd)/.tflint.hcl"
